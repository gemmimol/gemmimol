  <div id="viewer1"><b>0.8.4 (reference)</b></div>
  <div id="viewer2"><b>current</b></div>

    V1 = new GM_old.Viewer("viewer1");
    V1.load_pdb_and_ccp4_maps("data/1mru.pdb",
