<!doctype html>
<html lang="en">
<head>
  <title>3kw8 - GemmiMol</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <style>
   body { font-family: sans-serif; }
   canvas { display: block; }
   #viewer {
     position: absolute;
     left: 0;
     top: 0;
     width: 100%;
     height: 100%;
   }
   #gm-overlay {
     position: absolute;
     top: 5px;
     left: 5px;
     right: 5px;
     display: flex;
     flex-direction: column;
     align-items: flex-start;
     gap: 4px;
     pointer-events: none;
     z-index: 9;
   }
   #gm-overlay > * { pointer-events: auto; }
   #hud {
     font-size: 15px;
     color: #ddd;
     background-color: rgba(0,0,0,0.6);
     text-align: center;
     align-self: center;
     width: 80%;
     padding: 2px 8px;
     border-radius: 5px;
     white-space: pre-line;
   }
   #hud u { padding: 0 8px; text-decoration: none;
            border: solid; border-width: 1px 0; }
   #hud s { padding: 0 8px; text-decoration: none; opacity: 0.5; }
   #help {
     display: none;
     font-size: 16px;
     color: #eee;
     background-color: rgba(0,0,0,0.7);
     position: absolute;
     left: 20px;
     top: 50%;
     transform: translateY(-50%);
     cursor: default;
     padding: 5px;
     border-radius: 5px;
     z-index: 9;
     white-space: pre-line;
   }
   #inset {
     width: 200px;
     height: 200px;
     background-color: #888;
     position: absolute;
     right: 0;
     bottom: 0;
     z-index: 2;
     display: none;
   }
   a { color: #59C; }
  </style>

  <script src="gemmimol.js"></script>
  <script src="vendor/wasm/gemmi.js"></script>

</head>
<body style="background-color: black">
  <div id="viewer"></div>
  <div id="gm-overlay">
    <header id="hud" onmousedown="event.stopPropagation();"
                     ondblclick="event.stopPropagation();"></header>
  </div>
  <footer id="help"></footer>
  <div id="inset"></div>
  <script>
    V = new GM.Viewer({viewer: "viewer", hud: "hud", help: "help"});
    V.hud("loading 3kw8...");
    Gemmi().then(function (gemmi) {
      V.load_pdb(
        "3kw8_mc_restraints.mmcif",
        {gemmi: gemmi},
        function () {
          GM.load_maps_from_mtz(
            gemmi,
            V,
            "https://www.ebi.ac.uk/pdbe/coordinates/files/3kw8_map.mtz"
          );
        }
      );
    });
  </script>
</body>
</html>
