<!doctype html>
<html lang="en">
<head>
  <title>1mru - GemmiMol</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <link rel="stylesheet" href="gemmimol.css">

  <script src="gemmimol.js?v=symm-colors-1"></script>
  <script src="vendor/wasm/gemmi.js"></script>

</head>
<body style="background-color: black">
  <div id="viewer"></div>
  <div id="gm-overlay">
    <header id="hud" onmousedown="event.stopPropagation();"
                     ondblclick="event.stopPropagation();"></header>
  </div>
  <footer id="help"></footer>
  <div id="inset"></div>
  <script>
    V = new GM.Viewer({viewer: "viewer", hud: "hud", help: "help"});
    V.hud("loading 1mru with Gemmi...");

    function bondingSummary(info) {
      if (!info) return "Gemmi bonding fallback\nsource: unavailable";
      return [
        "Gemmi bonding fallback",
        "source: " + info.source,
        "CCD loaded: " + info.monomers_loaded + " / " + info.monomers_requested,
        "bonds: " + info.bond_count,
      ].join("\n");
    }

    function showBondingSummary() {
      const info = V.last_bonding_info;
      if (info && info.source === "gemmi") return;
      const text = bondingSummary(info);
      V.initial_hud_html = text;
      V.hud(text, "HTML");
    }

    V.load_model("data/1mru.pdb", {}, function () {
      showBondingSummary();
    });
    V.load_ccp4_maps("data/1mru.map", "data/1mru_diff.map");
  </script>
</body>
</html>
