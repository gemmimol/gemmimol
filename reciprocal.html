<!doctype html>
<html lang="en">
<head>
  <title>Reciprocal GemmiMol</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <link rel="stylesheet" href="gemmimol.css">

  <script src="gemmimol.js?v=20260408-hotfix-1"></script>
  <script src="vendor/wasm/gemmi.js?v=20260408-hotfix-1"></script>

</head>
<body style="background-color: black">
  <div id="viewer"></div>
  <script>
    V = new GM.ReciprocalViewer("viewer");
    V.init_default();
    var rlp = /[?&#]rlp(=([^&#]*)|&|#|$)/.exec(window.location.href);
    if (rlp && rlp[2])
      V.load_data(decodeURIComponent(rlp[2].replace(/\+/g, " ")));
    else
      V.hud('Drag your rlp.json and/or dials.rs_mapper map to this page.');
  </script>
</body>
</html>
