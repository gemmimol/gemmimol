<!doctype html>
<html lang="en">
<head>
  <title>Reciprocal GemmiMol</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <link rel="stylesheet" href="gemmimol.css">

  <script src="gemmimol.js?v=symm-colors-1"></script>
  <script src="vendor/wasm/gemmi.js"></script>

</head>
<body style="background-color: black">
  <div id="viewer"></div>
  <div id="gm-overlay">
    <header id="hud" onmousedown="event.stopPropagation();"
                     ondblclick="event.stopPropagation();"
             >This is reciprocal GM. <a href="#"
                         onclick="V.toggle_help(); return false;"
                         >H shows help.</a></header>
  </div>
  <footer id="help"></footer>
  <div id="inset"></div>
  <script>
    V = new GM.ReciprocalViewer({viewer: "viewer", hud: "hud", help: "help"});
    var rlp = /[?&#]rlp(=([^&#]*)|&|#|$)/.exec(window.location.href);
    if (rlp && rlp[2])
      V.load_data(decodeURIComponent(rlp[2].replace(/\+/g, " ")));
    else
      V.hud('Drag your rlp.json and/or dials.rs_mapper map to this page.');
  </script>
</body>
</html>
