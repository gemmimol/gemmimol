<!doctype html>
<html lang="en">
<head>
  <title>Multi - GemmiMol</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#333333">
  <style>
   canvas { display: block; }
   body { background-color: #230; font: 14px sans-serif; color: #ddd; }
   #viewer1 { position: relative; width: 500px; height: 800px; }
   #viewer2 { position: absolute; left: 800px; top: 0;
              width: 500px; height: 400px; }
   #viewer3 { position: absolute; left: 550px; top: 420px;
              width: 800px; height: 500px; }
   #info { white-space: pre-line; position: absolute; top: 20px; right: 20px; }
   div b { position: absolute; top: 10px; left: 10px; }
  </style>

  <script src="../gemmimol.js"></script>
  <script src="../vendor/wasm/gemmi.js"></script>

</head>
<body>
  <!-- Note: for now the canvas that will be created must have the same
    size as the parent div. I.e. <b> below must not take any space
    (with position:absolute it's ok) -->
  <div id="viewer1"><b>#1</b></div>
  <div id="viewer2"><b>#2</b></div>
  <div id="viewer3"><b>#3</b></div>
  <footer id="info"></footer>
  <script>
    V1 = new GM.Viewer("viewer1");
    V1.init_default();
    V1.load_pdb("../data/1mru.pdb");
    V1.load_ccp4_maps("../data/1mru.map", "../data/1mru_diff.map");
    V2 = new GM.Viewer("viewer2");
    V2.init_default();
    V2.config.mainchain_style = "ribbon";
    V2.config.sidechain_style = "invisible";
    V2.config.color_prop = "index";
    V2.load_pdb("../data/1mru.pdb");
    V3 = new GM.Viewer("viewer3");
    V3.init_default();
    V3.config.color_scheme = "solarized light";
    V3.config.colors = GM.ColorSchemes[V3.config.color_scheme];
    V3.load_pdb("../data/1mru.pdb");
    V1.renderer.domElement.focus();
    document.getElementById("info").textContent =
      "Each viewer now initializes explicitly with init_default().";
  </script>
</body>
</html>
